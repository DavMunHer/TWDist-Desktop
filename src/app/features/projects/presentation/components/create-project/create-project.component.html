<div class="profile-modal">
  <form class="create-project-form" [formGroup]="projectForm" (submit)="submit()">
    <div class="form-group">
      <label for="projectName">Project Name</label>
      <input type="text" id="projectName" name="projectName" formControlName="projectName"
        placeholder="My Awesome Project" required>
    </div>
    <div class="form-group">
      <label for="favorite">Favorite</label>
      <div class="favorite-toggle">
        <label class="switch">
          <input type="checkbox" formControlName="favorite">
          <span class="slider"></span>
        </label>
        <div>Add to Favorites</div>
      </div>
    </div>
    <hr>
    <div class="create-project-buttons-section">
      <button class="cancel" type="button" (click)="cancel()">Cancel</button>
      <button class="create" type="submit">{{ isEditMode ? 'Update Project' : 'Create Project' }}</button>
    </div>
  </form>
</div>
