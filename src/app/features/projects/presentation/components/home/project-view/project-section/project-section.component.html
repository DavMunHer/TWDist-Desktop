<section class="project-section-container">
    <div class="project-section">
        <header class="section-header">
            <app-section-title [title]="sectionInfo().name" [titleStyle]="'bold'" />
        </header>
        <main class="tasks-container">
            @for (task of sectionInfo().tasks; track $index) {
                <app-task [taskInfo]="task" (taskCompleted)="emitTaskToCompleted(task)" />
            }
        </main>
    </div>
</section>
