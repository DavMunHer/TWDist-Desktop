<section class="project-section">
  <nav>
    <app-breadcrumb [showIcon]="showIcon()" (iconClick)="handleIconChange()"/>
  </nav>
  <header class="project-header">
    {{projectInfo()?.name}}
  </header>

  <main class="project-main-container">
    @for (section of projectInfo()?.sections; track $index) {
    <app-project-section [sectionInfo]="section" (taskUpdate)="updateTaskToCompleted(section, $event)" />
    }
  <app-section-adder />
  </main>
</section>
