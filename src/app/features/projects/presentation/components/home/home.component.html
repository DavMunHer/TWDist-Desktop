<main class="main">
  <div class="content">
    <aside class="sidebar-container">
      <app-sidebar
        [sidebarVisibleInput]="visibleSidebar()"
        [navMenuSectionInfo]="navMenuSectionInfo()"
        [favoriteMenuSectionInfo]="favoriteMenuSectionInfo()"
        [projectsMenuSectionInfo]="projectsMenuSectionInfo()"
        (sidebarClose)="toggleSidebar($event)"
        (menuItemClick)="onSidebarMenuItemClick($event)"
        (favoriteClick)="onSidebarFavoriteClick($event)"
        (deleteClick)="onSidebarDeleteClick($event)"
      />
    </aside>
    <section class="view-section">
      @if (rightPanelView() === 'today') {
      <app-today [showIcon]="visibleSidebar()" (showIconChange)="toggleSidebar($event)"></app-today>
      } @else if (rightPanelView() === 'upcoming') {
      <app-upcoming [showIcon]="visibleSidebar()" (showIconChange)="toggleSidebar($event)"></app-upcoming>
      } @else {
      <project-view [showIcon]="visibleSidebar()" (showIconChange)="toggleSidebar($event)"></project-view>
      }
    </section>
  </div>
</main>
